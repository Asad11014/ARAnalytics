# Render Blueprint — pf-forecaster DEMO deployment
# A public, read-only demo: a Node web service seeded with sample data on boot.
# The database is a separate, free external Postgres (e.g. Neon), so nothing in
# the demo can ever touch real production data.
#
# DATABASE_URL is set manually in the Render dashboard (sync: false) — paste the
# Neon connection string there. It MUST be the demo DB, never production.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: pf-forecaster-demo
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22.13.0"
      # Enables SSL for the Postgres connection (see server/db.js). Neon requires SSL.
      - key: NODE_ENV
        value: production
      # Turns this deployment into the demo: seeds sample data on boot, exposes
      # /api/demo-login, disables live sync / Mintsoft proxy, blocks all writes.
      - key: DEMO_MODE
        value: "true"
      # Set in the dashboard — paste the external (Neon) demo connection string.
      - key: DATABASE_URL
        sync: false
